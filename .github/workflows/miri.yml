name: MIRI Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust nightly with miri
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Run miri
        run: cargo miri test
        env:
          MIRIFLAGS: "-Zmiri-track-raw-pointers"
